<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover your daily TypeMoon character.">
    <meta property="og:title" content="TypeMoon Character of the Day">
    <meta property="og:description" content="Find your daily TypeMoon character!">
    <meta property="og:image" content="https://reisryougi.github.io/charoftheday/img/ogimage.png">
    <meta name="theme-color" content="#2b2f4a">
    <link rel="stylesheet" href="style.css">
    <title>Your TypeMoon Character of the Day</title>
</head>
<body>
    <header>
        <h1>Your TypeMoon character of the day!</h1>
        <button id="collectionBtn">Check Collection</button>
    </header>
    <main>
        <h2>Your character is:</h2>
        <section class="character">
            <div class="frame">
                <img id="picture" src="img/unknown.jpg" alt="unknown">
            </div>
            <p id="name">Roll!</p>
        </section>
        <section id="roll">
            <p>Roll for your character!</p>
            <button id="rollBtn">roll</button>
        </section>
    </main>
    <aside id="collectionPanel"></aside>
    <footer>
        <p>Author: <a href="https://x.com/ReisRyougi">Reis Ryougi</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
